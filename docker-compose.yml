services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/todo_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
